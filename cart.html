<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natural Craft Cart</title>
  <meta name="description" content="Review selected Natural Craft products, quantities, and order summary.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="cart">
  <div data-header></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="page-hero__shell reveal">
          <span class="eyebrow">Natural Craft Cart</span>
          <h1 class="section-title">Review the products selected from the Natural Craft collection.</h1>
          <p>The cart keeps product images, quantity controls, and totals visible so the storefront still feels premium after the initial browse phase.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container cart-layout">
        <div class="cart-layout__panel" data-cart-items></div>
        <div data-cart-summary></div>
      </div>
    </section>
  </main>
  <div data-footer></div>
  <div data-cart-drawer></div>
  <script src="site.js"></script>
</body>
</html>
